<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神预 DApp - 测试网</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.1.1/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{background:#f6f7f9;padding:20px}
        .container{max-width:600px;margin:20px auto;background:white;padding:24px;border-radius:16px}
        h2{color:#222;margin-bottom:16px}
        .status{margin:10px 0;color:#333}
        input{padding:10px;width:140px;border:1px solid #ddd;border-radius:8px;margin:5px 0}
        button{padding:12px 20px;background:#007bff;color:white;border:none;border-radius:10px;margin:5px;cursor:pointer}
        .success{color:#00a800}
    </style>
</head>
<body>
<div class="container">
    <h2>🐉 神预 DApp · BSC 测试网</h2>
    <button onclick="connectWallet()">连接钱包</button>
    <p class="status" id="account"></p>

    <h3>🎮 游戏 #1 预测</h3>
    <p class="status">投注 BNB · 买涨 / 买跌</p>
    <input type="number" id="amount" placeholder="输入投注数量" step="0.01">
    <br>
    <button onclick="placeBet(1, 0)">📈 买涨</button>
    <button onclick="placeBet(1, 1)">📉 买跌</button>

    <br><br>
    <button onclick="claimReward(1)">💰 领取奖励</button>
    <p class="status success" id="tip">已部署到 BSC 测试网，可直接玩</p>
</div>

<script>
// ==========================================
// 神预 DApp 测试网完整版 | 已配置好合约
// ==========================================
const CONTRACT_ADDRESS = "0x952eE1c26245533C9aD5f5C92B554f0C1cE29423";
const CHAIN_ID = 97; // BSC 测试网

const ABI = [
    {"inputs":[{"internalType":"address","name":"_operate","type":"address"},{"internalType":"address","name":"_node","type":"address"},{"internalType":"address","name":"_pool","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},
    {"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"player","type":"address"},{"indexed":true,"internalType":"uint256","name":"gameId","type":"uint256"},{"internalType":"uint8","name":"option","type":"uint8"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"BetPlaced","type":"event"},
    {"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"gameId","type":"uint256"},{"internalType":"uint8","name":"result","type":"uint8"}],"name":"GameSettled","type":"event"},
    {"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"player","type":"address"},{"indexed":true,"internalType":"uint256","name":"gameId","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"RewardClaimed","type":"event"},
    {"inputs":[{"internalType":"uint256","name":"gameId","type":"uint256"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"},
    {"inputs":[],"name":"createGame","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"gameId","type":"uint256"}],"name":"claimReward","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"gameId","type":"uint256"},{"internalType":"uint8","name":"result","type":"uint8"}],"name":"settleGame","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"withdrawFee","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"BASE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"NODE_RATE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"OPERATE_RATE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"POOL_RATE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"WINNER_RATE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"gameBets","outputs":[{"internalType":"address","name":"player","type":"address"},{"internalType":"uint256","name":"gameId","type":"uint256"},{"internalType":"uint8","name":"option","type":"uint8"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"bool","name":"claimed","type":"bool"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"gameCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"games","outputs":[{"internalType":"uint256","name":"id","type":"uint256"},{"internalType":"uint256","name":"totalUp","type":"uint256"},{"internalType":"uint256","name":"totalDown","type":"uint256"},{"internalType":"uint8","name":"result","type":"uint8"},{"internalType":"uint8","name":"status","type":"uint8"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"nodeWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"operateWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"poolWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;

// 连接钱包
async function connectWallet() {
    if (!window.ethereum) return alert("请在 TP / MetaMask 浏览器打开");
    const accounts = await ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById("account").innerText = "已连接：" + account;

    web3 = new Web3(window.ethereum);
    contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
    alert("钱包连接成功！");
}

// 投注
async function placeBet(gameId, option) {
    if (!account) return alert("请先连接钱包");
    const val = document.getElementById("amount").value;
    if (!val || val <= 0) return alert("输入有效金额");

    await contract.methods.bet(gameId, option).send({
        from: account,
        value: web3.utils.toWei(val, "ether")
    });
    alert("投注成功！");
}

// 领奖
async function claimReward(gameId) {
    if (!account) return alert("请先连接钱包");
    await contract.methods.claimReward(gameId).send({ from: account });
    alert("奖励领取成功！");
}
</script>
</body>
</html>
