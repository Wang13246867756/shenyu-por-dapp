<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神预 AI - 链上预测</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body {
      background: #050816;
      color: #fff;
      background-image: 
        radial-gradient(circle at 20% 10%, rgba(64,158,255,0.1), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(103,58,183,0.1), transparent 40%);
      min-height: 100vh;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(12,18,36,0.9);
      border-bottom: 1px solid rgba(64,158,255,0.2);
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .logo {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(90deg, #409eff, #722ed1);
      -webkit-background-clip: text;
      color: transparent;
    }
    .nav {
      display: flex;
      gap: 28px;
    }
    .nav a {
      color: #c0c8e7;
      text-decoration: none;
      font-size: 15px;
    }
    .nav a:hover {
      color: #409eff;
    }
    .wallet-btn {
      padding: 9px 22px;
      background: linear-gradient(90deg, #409eff, #722ed1);
      border: none;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
    }
    .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: rgba(18,26,48,0.6);
      border: 1px solid rgba(64,158,255,0.2);
      border-radius: 12px;
      padding: 20px;
    }
    .card .label {
      color: #8992b3;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 22px;
      font-weight: bold;
    }
    .game {
      background: rgba(18,26,48,0.6);
      border: 1px solid rgba(64,158,255,0.2);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
    }
    .game-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    .game-title {
      font-size: 20px;
      font-weight: 600;
    }
    .countdown {
      color: #ff7d00;
      font-weight: bold;
      font-size: 18px;
    }
    .bet-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }
    .bet-yes {
      background: rgba(22,163,74,0.15);
      border: 1px solid #16a34a;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
    }
    .bet-no {
      background: rgba(220,38,38,0.15);
      border: 1px solid #dc2626;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
    }
    .bet-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .yes { color: #16a34a; }
    .no { color: #dc2626; }
    .bottom {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 20px;
    }
    .module {
      background: rgba(18,26,48,0.6);
      border: 1px solid rgba(64,158,255,0.2);
      border-radius: 12px;
      padding: 25px;
    }
    .module-title {
      font-size: 18px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(64,158,255,0.2);
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      color: #c0c8e7;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">神预 AI 生态</div>
  <div class="nav">
    <a href="#">首页</a>
    <a href="#">预测对局</a>
    <a href="#">节点中心</a>
    <a href="#">团队推广</a>
    <a href="#">AI会员</a>
    <a href="#">个人中心</a>
  </div>
  <button class="wallet-btn" id="connectBtn">连接钱包</button>
</div>

<div class="container">
  <div class="data-grid">
    <div class="card">
      <div class="label">当前奖池总额</div>
      <div class="value" id="pool">128.65 BNB</div>
    </div>
    <div class="card">
      <div class="label">我的余额</div>
      <div class="value" id="balance">0.00 BNB</div>
    </div>
    <div class="card">
      <div class="label">团队活跃度</div>
      <div class="value" id="active">0</div>
    </div>
    <div class="card">
      <div class="label">待结算分红</div>
      <div class="value" id="bonus">0.00 BNB</div>
    </div>
  </div>

  <div class="game">
    <div class="game-head">
      <div class="game-title">实时二元预测</div>
      <div class="countdown" id="timer">00:04:26</div>
    </div>
    <div class="bet-box">
      <div class="bet-yes" onclick="bet('YES')">
        <div class="bet-text yes">YES 看涨</div>
        <div style="color:#8992b3">签名确认下注</div>
      </div>
      <div class="bet-no" onclick="bet('NO')">
        <div class="bet-text no">NO 看跌</div>
        <div style="color:#8992b3">签名确认下注</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="module">
      <div class="module-title">节点收益</div>
      <div class="row"><span>静态收益</span><span id="static">0.00</span></div>
      <div class="row"><span>动态分红</span><span id="dynamic">0.00</span></div>
      <div class="row"><span>本周总计</span><span id="week">0.00</span></div>
    </div>
    <div class="module">
      <div class="module-title">团队数据</div>
      <div class="row"><span>直推</span><span id="direct">0</span></div>
      <div class="row"><span>7级团队</span><span id="team">0</span></div>
      <div class="row"><span>今日流水</span><span id="flow">0.00</span></div>
    </div>
    <div class="module">
      <div class="module-title">AI会员</div>
      <div class="row"><span>会员等级</span><span id="vip">普通</span></div>
      <div class="row"><span>自动下注</span><span id="auto">关闭</span></div>
      <div class="row"><span>策略解锁</span><span>0项</span></div>
    </div>
  </div>
</div>

<script>
const CHAIN_ID = 97; // BSC测试网
let address = '';
let provider;
let signer;

// 连接钱包 + 强制签名登录
document.getElementById('connectBtn').onclick = async () => {
  if (!window.ethereum) {
    alert('请安装 MetaMask 钱包');
    return;
  }
  try {
    // 1. 连接钱包
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    address = await signer.getAddress();

    // 2. 关键：弹出签名（登录验证）
    const msg = `神预AI登录验证\n地址：${address}\n时间：${new Date().toLocaleString()}`;
    const signature = await signer.signMessage(msg); // ✅ 弹出签名
    console.log('用户签名：', signature);

    // 3. 连接成功
    document.getElementById('connectBtn').innerText = `${address.slice(0,6)}...${address.slice(-4)}`;
    document.getElementById('balance').innerText = '3.2156 BNB';
    alert('钱包连接 & 签名验证成功！');
  } catch (err) {
    alert('签名取消或失败：' + err.message);
    console.error(err);
  }
};

// 下注时也弹出签名确认
async function bet(side) {
  if (!address) {
    alert('请先连接并签名钱包');
    return;
  }
  try {
    const msg = `神预预测下注\n方向：${side}\n地址：${address}\n时间：${Date.now()}`;
    const signature = await signer.signMessage(msg); // ✅ 下注也弹签名
    alert(`${side} 下注签名完成！\n签名：${signature.slice(0,30)}...`);
    // 这里再调用合约/接口
  } catch (err) {
    alert('下注签名失败：' + err.message);
  }
}

// 倒计时
setInterval(() => {
  let t = document.getElementById('timer').innerText.split(':');
  let m = parseInt(t[0]), s = parseInt(t[1]), ms = parseInt(t[2]);
  if (ms > 0) ms--;
  else if (s > 0) { s--; ms = 59; }
  else if (m > 0) { m--; s = 59; ms = 59; }
  document.getElementById('timer').innerText = 
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms).padStart(2,'0')}`;
}, 1000);
</script>
</body>
</html>
