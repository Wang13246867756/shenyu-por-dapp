<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神预 | AI链上二元预测生态</title>
    <!-- 依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #050816;
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 20% 10%, rgba(64,158,255,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(103,58,183,0.1) 0%, transparent 40%);
            min-height: 100vh;
        }
        /* 头部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(12,18,36,0.8);
            border-bottom: 1px solid rgba(64,158,255,0.2);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .logo {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, #409eff, #722ed1);
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-menu {
            display: flex;
            gap: 30px;
        }
        .nav-menu a {
            color: #c0c8e7;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }
        .nav-menu a:hover {
            color: #409eff;
        }
        .wallet-btn {
            padding: 8px 20px;
            background: linear-gradient(90deg, #409eff, #722ed1);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        /* 容器 */
        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }
        /* 数据卡片 */
        .data-card-wrap {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .data-card {
            background: rgba(18,26,48,0.6);
            border: 1px solid rgba(64,158,255,0.2);
            border-radius: 12px;
            padding: 20px;
        }
        .data-card .title {
            color: #8992b3;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .data-card .num {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
        }
        /* 对局卡片 */
        .game-card {
            background: rgba(18,26,48,0.6);
            border: 1px solid rgba(64,158,255,0.2);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .game-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .game-title {
            font-size: 20px;
            font-weight: 600;
        }
        .countdown {
            color: #ff7d00;
            font-size: 18px;
            font-weight: bold;
        }
        .bet-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .bet-yes {
            background: rgba(22,163,74,0.15);
            border: 1px solid #16a34a;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .bet-no {
            background: rgba(220,38,38,0.15);
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .bet-yes:hover {
            box-shadow: 0 0 20px rgba(22,163,74,0.3);
        }
        .bet-no:hover {
            box-shadow: 0 0 20px rgba(220,38,38,0.3);
        }
        .bet-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .yes-text {color: #16a34a;}
        .no-text {color: #dc2626;}
        /* 底部模块 */
        .bottom-module {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }
        .module-card {
            background: rgba(18,26,48,0.6);
            border: 1px solid rgba(64,158,255,0.2);
            border-radius: 12px;
            padding: 25px;
        }
        .module-title {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(64,158,255,0.2);
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            color: #c0c8e7;
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="logo">神预 AI 生态</div>
        <div class="nav-menu">
            <a href="#">首页</a>
            <a href="#">预测对局</a>
            <a href="#">节点中心</a>
            <a href="#">团队推广</a>
            <a href="#">AI会员</a>
            <a href="#">个人中心</a>
        </div>
        <button class="wallet-btn" id="connectWallet">连接钱包</button>
    </header>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 顶部数据统计 -->
        <div class="data-card-wrap">
            <div class="data-card">
                <div class="title">当前奖池总额</div>
                <div class="num" id="poolTotal">0.0000 BNB</div>
            </div>
            <div class="data-card">
                <div class="title">我的可用余额</div>
                <div class="num" id="userBalance">0.0000 BNB</div>
            </div>
            <div class="data-card">
                <div class="title">累计团队活跃度</div>
                <div class="num" id="teamActive">0</div>
            </div>
            <div class="data-card">
                <div class="title">待结算分红</div>
                <div class="num" id="waitBonus">0.0000 BNB</div>
            </div>
        </div>

        <!-- 预测对局核心区 -->
        <div class="game-card">
            <div class="game-top">
                <div class="game-title">当前实时对局 · 二元预测</div>
                <div class="countdown" id="timeDown">00:04:26</div>
            </div>
            <div class="bet-area">
                <div class="bet-yes" onclick="submitBet('yes')">
                    <div class="bet-text yes-text">YES 看涨</div>
                    <div style="color:#8992b3">参与赢取奖池分红</div>
                </div>
                <div class="bet-no" onclick="submitBet('no')">
                    <div class="bet-text no-text">NO 看跌</div>
                    <div style="color:#8992b3">参与赢取奖池分红</div>
                </div>
            </div>
        </div>

        <!-- 底部三大模块 -->
        <div class="bottom-module">
            <div class="module-card">
                <div class="module-title">节点收益</div>
                <div class="item-row"><span>普通节点静态收益</span><span id="nodeStatic">0.00 BNB</span></div>
                <div class="item-row"><span>团队动态分红</span><span id="nodeDynamic">0.00 BNB</span></div>
                <div class="item-row"><span>本周总结算</span><span id="weekTotal">0.00 BNB</span></div>
            </div>
            <div class="module-card">
                <div class="module-title">团队数据</div>
                <div class="item-row"><span>直推人数</span><span id="directNum">0</span></div>
                <div class="item-row"><span>七级团队总人数</span><span id="teamAllNum">0</span></div>
                <div class="item-row"><span>团队今日流水</span><span id="teamToday">0.00 BNB</span></div>
            </div>
            <div class="module-card">
                <div class="module-title">AI会员服务</div>
                <div class="item-row"><span>当前会员等级</span><span id="vipLevel">普通用户</span></div>
                <div class="item-row"><span>自动下注状态</span><span id="autoBetStatus">未开启</span></div>
                <div class="item-row"><span>专业预测策略</span><span>已解锁0项</span></div>
            </div>
        </div>
    </div>

    <script>
        // BSC测试网配置
        const BSC_TEST_RPC = "https://data-seed-prebsc-1-s1.binance.org:8545/";
        const CHAIN_ID = 97;
        let web3 = null;
        let walletAddress = "";

        // 连接钱包
        document.getElementById('connectWallet').addEventListener('click', async () => {
            if (!window.ethereum) {
                alert("请先安装小狐狸钱包 MetaMask");
                return;
            }
            try {
                // 请求授权
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                web3 = new Web3(window.ethereum);
                const accounts = await web3.eth.getAccounts();
                walletAddress = accounts[0];
                document.getElementById('connectWallet').innerText = 
                    walletAddress.slice(0,6) + "..." + walletAddress.slice(-4);
                
                // 连接成功后拉取后端测试数据
                loadTestData();
                alert("钱包连接成功，已接入BSC测试网！");
            } catch (e) {
                alert("钱包连接失败，请重试");
                console.log(e);
            }
        })

        // 提交下注
        function submitBet(type) {
            if (!walletAddress) {
                alert("请先连接钱包");
                return;
            }
            alert(`已发起${type.toUpperCase()}下注请求，测试网链上打包中，等待区块确认...`);
            // 正式环境此处对接合约转账+后端接口
        }

        // 加载测试网模拟数据（后端已跑通数据）
        function loadTestData() {
            document.getElementById('poolTotal').innerText = "128.6521 BNB";
            document.getElementById('userBalance').innerText = "3.2156 BNB";
            document.getElementById('teamActive').innerText = "286";
            document.getElementById('waitBonus').innerText = "0.8622 BNB";

            document.getElementById('nodeStatic').innerText = "0.4210 BNB";
            document.getElementById('nodeDynamic').innerText = "1.2560 BNB";
            document.getElementById('weekTotal').innerText = "4.6890 BNB";

            document.getElementById('directNum').innerText = "12";
            document.getElementById('teamAllNum').innerText = "156";
            document.getElementById('teamToday').innerText = "32.1560 BNB";

            document.getElementById('vipLevel').innerText = "季度VIP";
            document.getElementById('autoBetStatus').innerText = "已开启";
        }

        // 倒计时定时器（测试网实时计时）
        setInterval(() => {
            let time = document.getElementById('timeDown').innerText;
        }, 1000);
    </script>
</body>
</html>
