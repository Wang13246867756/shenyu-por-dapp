<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神预 AI 链上预测生态</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    body {
      background-color: #060a1b;
      color: #fff;
      padding-bottom: 50px;
    }
    /* 头部导航 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #0b1025;
      border-bottom: 1px solid #1f2947;
    }
    .logo {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(90deg,#409eff,#7c3aed);
      -webkit-background-clip: text;
      color: transparent;
    }
    .connect-btn {
      background: linear-gradient(90deg,#409eff,#7c3aed);
      border: 0;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    /* 容器 */
    .wrap {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* 数据卡片 */
    .data-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .data-card {
      background: #101833;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #1f2947;
    }
    .data-card p:first-child {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .data-card p:last-child {
      font-size: 18px;
      font-weight: 600;
    }
    /* 对局卡片 */
    .game-card {
      background: #101833;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #1f2947;
      margin-bottom: 20px;
    }
    .game-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .game-title {
      font-size: 17px;
    }
    .time {
      color: #ff9500;
      font-weight: bold;
    }
    .bet-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .yes-btn,.no-btn {
      padding: 30px 10px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      border: none;
      font-size: 20px;
      font-weight: bold;
    }
    .yes-btn {
      background: rgba(16,185,129,0.15);
      border: 1px solid #10b981;
      color: #10b981;
    }
    .no-btn {
      background: rgba(239,68,68,0.15);
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    /* 底部模块 */
    .info-card {
      background: #101833;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #1f2947;
    }
    .info-title {
      font-size: 16px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1f2947;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">神预AI生态</div>
  <button class="connect-btn" id="connectWallet">连接钱包</button>
</div>

<div class="wrap">
  <div class="data-row">
    <div class="data-card">
      <p>奖池总额</p>
      <p id="poolNum">0.00 BNB</p>
    </div>
    <div class="data-card">
      <p>我的余额</p>
      <p id="balanceNum">0.00 BNB</p>
    </div>
    <div class="data-card">
      <p>团队活跃度</p>
      <p id="activeNum">0</p>
    </div>
    <div class="data-card">
      <p>待分红</p>
      <p id="bonusNum">0.00 BNB</p>
    </div>
  </div>

  <div class="game-card">
    <div class="game-top">
      <div class="game-title">当前预测对局</div>
      <div class="time" id="countTime">00:03:59</div>
    </div>
    <div class="bet-box">
      <button class="yes-btn" id="betYes">YES 看涨</button>
      <button class="no-btn" id="betNo">NO 看跌</button>
    </div>
  </div>

  <div class="info-card">
    <div class="info-title">账号数据</div>
    <div class="info-item"><span>节点静态收益</span><span id="staticNum">0.00 BNB</span></div>
    <div class="info-item"><span>团队动态收益</span><span id="dynamicNum">0.00 BNB</span></div>
    <div class="info-item"><span>直推人数</span><span id="directNum">0</span></div>
    <div class="info-item"><span>AI会员状态</span><span id="vipText">未开通</span></div>
  </div>
</div>

<script>
  // BSC测试网配置
  const BSC_TEST = {
    chainId: 97,
    rpc: "https://data-seed-prebsc-1-s1.binance.org:8545/",
    name: "BSC测试网"
  };

  let provider = null;
  let signer = null;
  let walletAddr = "";

  const connectBtn = document.getElementById("connectWallet");
  const betYesBtn = document.getElementById("betYes");
  const betNoBtn = document.getElementById("betNo");

  // 绑定点击事件，保证100%可点击
  connectBtn.addEventListener("click", connectWallet);
  betYesBtn.addEventListener("click", ()=>submitBet("YES"));
  betNoBtn.addEventListener("click", ()=>submitBet("NO"));

  // 连接钱包 + 自动切链 + 弹出签名
  async function connectWallet() {
    if(!window.ethereum){
      alert("请先安装小狐狸钱包 MetaMask");
      return;
    }
    try {
      // 请求钱包
      await window.ethereum.request({method:"eth_requestAccounts"});
      provider = new ethers.providers.Web3Provider(window.ethereum);

      // 自动切换BSC测试网
      try{
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{chainId: "0x61"}]
        });
      }catch(e){
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId:"0x61",
            chainName:"BSC Testnet",
            rpcUrls:[BSC_TEST.rpc],
            nativeCurrency:{name:"BNB",symbol:"BNB",decimals:18},
            blockExplorerUrls:["https://testnet.bscscan.com/"]
          }]
        });
      }

      signer = provider.getSigner();
      walletAddr = await signer.getAddress();

      // 弹出签名
      const signMsg = "欢迎登录神预AI生态\n钱包地址：" + walletAddr;
      await signer.signMessage(signMsg);

      connectBtn.innerText = walletAddr.slice(0,6)+"..."+walletAddr.slice(-4);
      loadData();
      alert("钱包连接+签名验证成功！");
    } catch (err) {
      alert("操作失败："+err.message);
    }
  }

  // 下注签名
  async function submitBet(type) {
    if(!walletAddr){
      alert("请先连接钱包");
      return;
    }
    try{
      const betMsg = "确认提交"+type+"方向下注";
      await signer.signMessage(betMsg);
      alert(type+" 下注签名完成，提交链上处理中");
    }catch(err){
      alert("下注取消或失败");
    }
  }

  // 加载模拟数据
  function loadData(){
    document.getElementById("poolNum").innerText = "96.3215 BNB";
    document.getElementById("balanceNum").innerText = "2.1568 BNB";
    document.getElementById("activeNum").innerText = "216";
    document.getElementById("bonusNum").innerText = "0.7530 BNB";
    document.getElementById("staticNum").innerText = "0.3210 BNB";
    document.getElementById("dynamicNum").innerText = "1.1250 BNB";
    document.getElementById("directNum").innerText = "9";
    document.getElementById("vipText").innerText = "季度VIP";
  }

  // 自动倒计时
  function countDown(){
    let timeStr = document.getElementById("countTime").innerText;
    let arr = timeStr.split(":");
    let h = parseInt(arr[0]),m=parseInt(arr[1]),s=parseInt(arr[2]);
    s--;
    if(s<0){s=59;m--;}
    if(m<0){m=59;h--;}
    if(h<0&&m<0&&s<0) return;
    document.getElementById("countTime").innerText = 
      String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  }
  setInterval(countDown,1000);
</script>

</body>
</html>
